<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Check!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glossy-red: linear-gradient(180deg, #ff8a8a 0%, #ff4d4d 50%, #e60000 100%);
            --glossy-teal: linear-gradient(180deg, #7cf2e1 0%, #4ecdc4 50%, #2fb0a7 100%);
            --glossy-gold: linear-gradient(180deg, #ffe066 0%, #ffcc00 50%, #cca300 100%);
            --btn-shadow: 0 10px 0 #222, 0 15px 25px rgba(0,0,0,0.4);
            --btn-active-shadow: 0 3px 0 #222, 0 8px 10px rgba(0,0,0,0.4);
            
            /* 3D Image Border variables */
            --img-radius: 40px; 
            --border-width: 12px;
            --shadow-3d: 
                0 4px 0 #ddd, /* The 'thick' side of the 3D border */
                0 15px 30px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }

        #home-page { background-image: url('home_page.png'); }
        #flashcard-page { background-image: url('flashcard_page.png'); padding-top: 5vh; }

        /* Glossy Skeuomorphic Buttons */
        .btn-modern {
            cursor: pointer;
            border: 4px solid rgba(255,255,255,0.9);
            border-radius: 60px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: white;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            box-shadow: var(--btn-shadow);
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .btn-modern::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.05));
            pointer-events: none;
        }

        /* Start Button Positioning */
        .btn-start { 
            background: var(--glossy-gold); 
            color: #222; 
            padding: 30px 100px;
            font-size: 3.5rem;
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-start:active {
            transform: translateX(-50%) translateY(8px);
            box-shadow: var(--btn-active-shadow);
        }

        /* Shuffle & Home Buttons */
        .btn-shuffle { 
            background: var(--glossy-teal); 
            padding: 20px 70px;
            font-size: 2.8rem;
        }
        
        .btn-shuffle:active {
            transform: translateY(8px);
            box-shadow: var(--btn-active-shadow);
        }

        .btn-home { 
            background: var(--glossy-red); 
            font-size: 1.3rem; 
            padding: 15px 35px; 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            box-shadow: 0 6px 0 #222;
        }

        /* Seamless Flashcard Layout */
        .card-container {
            width: 80vw; 
            max-height: 60vh;
            aspect-ratio: 1920 / 1080;
            perspective: 2000px;
            cursor: pointer;
            margin-bottom: 40px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The 3D White Seamless Border */
        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: white; /* Fills gaps if image ratio isn't perfect */
            border-radius: var(--img-radius);
            border: var(--border-width) solid white;
            box-shadow: var(--shadow-3d);
        }

        .card-back { transform: rotateY(180deg); }

        .controls {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: auto;
            margin-bottom: 50px;
        }

    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <button class="btn-modern btn-start" onclick="showFlashcards()">START</button>
    </div>

    <div id="flashcard-page" class="page">
        <button class="btn-modern btn-home" onclick="goHome()">HOME</button>

        <div class="card-container" onclick="flipCard()">
            <div id="card-inner" class="card-inner">
                <div class="card-face card-front">
                    <img id="img-front" src="" alt="Front">
                </div>
                <div class="card-face card-back">
                    <img id="img-back" src="" alt="Back">
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-modern btn-shuffle" onclick="shuffleCard()">SHUFFLE</button>
        </div>
    </div>

    <script>
        const pairs = [
            {f: 'A_arms.png', b: 'B_arms.png'}, {f: 'A_cold.png', b: 'B_cold.png'},
            {f: 'A_ears.png', b: 'B_ears.png'}, {f: 'A_eyes.png', b: 'B_eyes.png'},
            {f: 'A_feet.png', b: 'B_feet.png'}, {f: 'A_fever.png', b: 'B_fever.png'},
            {f: 'A_foot.png', b: 'B_foot.png'}, {f: 'A_hands.png', b: 'B_hands.png'},
            {f: 'A_head.png', b: 'B_head.png'}, {f: 'A_headache.png', b: 'B_headache.png'},
            {f: 'A_knees.png', b: 'B_knees.png'}, {f: 'A_legs.png', b: 'B_legs.png'},
            {f: 'A_mouth.png', b: 'B_mouth.png'}, {f: 'A_nose.png', b: 'B_nose.png'},
            {f: 'A_runny_nose.png', b: 'B_runny_nose.png'}, {f: 'A_sore_throat.png', b: 'B_sore_throat.png'},
            {f: 'A_stomachache.png', b: 'B_stomachache.png'}, {f: 'A_toothache.png', b: 'B_toothache.png'}
        ];

        let availableIndices = [];
        const cardInner = document.getElementById('card-inner');
        const imgFront = document.getElementById('img-front');
        const imgBack = document.getElementById('img-back');

        function showFlashcards() {
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('flashcard-page').classList.add('active');
            shuffleCard();
        }

        function goHome() {
            document.getElementById('card-view'); // safety
            document.getElementById('flashcard-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
        }

        function flipCard() {
            cardInner.classList.toggle('flipped');
        }

        function shuffleCard() {
            cardInner.style.transition = 'none';
            cardInner.classList.remove('flipped');
            
            if (availableIndices.length === 0) {
                availableIndices = [...Array(pairs.length).keys()];
            }

            const randomIndex = Math.floor(Math.random() * availableIndices.length);
            const pairIndex = availableIndices.splice(randomIndex, 1)[0];
            const selectedPair = pairs[pairIndex];

            imgFront.src = selectedPair.f;
            imgBack.src = selectedPair.b;

            setTimeout(() => {
                cardInner.style.transition = 'transform 0.75s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 50);
        }

        // Interaction cleanup for iPad
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
