<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Check!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glossy-red: linear-gradient(180deg, #ff8a8a 0%, #ff4d4d 50%, #e60000 100%);
            --glossy-teal: linear-gradient(180deg, #7cf2e1 0%, #4ecdc4 50%, #2fb0a7 100%);
            --glossy-gold: linear-gradient(180deg, #ffe066 0%, #ffcc00 50%, #cca300 100%);
            --glossy-purple: linear-gradient(180deg, #a55eea, #8854d0);
            --btn-shadow: 0 10px 0 #222, 0 15px 25px rgba(0,0,0,0.4);
            --btn-active-shadow: 0 3px 0 #222, 0 8px 10px rgba(0,0,0,0.4);
            --img-radius: 40px; 
            --border-width: 12px;
            --shadow-3d: 0 4px 0 #ddd, 0 15px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Fredoka', sans-serif; overflow: hidden; }

        .page { display: none; width: 100vw; height: 100vh; background-size: cover; background-position: center; position: relative; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }

        #home-page { background-image: url('home_page.png'); }
        #flashcard-page { background-image: url('flashcard_page.png'); padding-top: 5vh; }

        /* Buttons */
        .btn-modern {
            cursor: pointer; border: 4px solid rgba(255,255,255,0.9); border-radius: 60px;
            font-family: 'Fredoka', sans-serif; font-weight: 700; color: white;
            text-shadow: 0 3px 6px rgba(0,0,0,0.3); box-shadow: var(--btn-shadow);
            transition: all 0.1s ease; position: relative; overflow: hidden; text-transform: uppercase;
        }
        .btn-modern::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.05));
        }

        /* Homepage Specific Layout */
        .btn-start { 
            background: var(--glossy-gold); 
            color: #222; 
            padding: 30px 100px; 
            font-size: 3.5rem; 
            position: absolute; 
            bottom: 12%; 
            left: 50%; 
            transform: translateX(-50%); 
        }
        
        .btn-instruction-home { 
            background: var(--glossy-purple); 
            font-size: 1.5rem; 
            padding: 15px 40px; 
            position: absolute; 
            top: 30px; 
            left: 30px; 
        }

        /* Flashcard Page Specific Layout */
        .btn-shuffle { background: var(--glossy-teal); padding: 20px 70px; font-size: 2.8rem; }
        .btn-home { background: var(--glossy-red); font-size: 1.1rem; padding: 12px 25px; position: absolute; top: 20px; right: 20px; box-shadow: 0 6px 0 #222; }

        .btn-modern:active { transform: translateY(8px); box-shadow: var(--btn-active-shadow); }
        .btn-start:active { transform: translateX(-50%) translateY(8px); }

        /* Card */
        .card-container { width: 80vw; max-height: 60vh; aspect-ratio: 1920 / 1080; perspective: 2000px; cursor: pointer; margin-bottom: 40px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; }
        .card-face img { width: 100%; height: 100%; object-fit: contain; background-color: white; border-radius: var(--img-radius); border: var(--border-width) solid white; box-shadow: var(--shadow-3d); }
        .card-back { transform: rotateY(180deg); }
        .controls { width: 100%; display: flex; justify-content: center; margin-top: auto; margin-bottom: 50px; }

        /* Overlay Instructions */
        #instruction-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; color: white;
            flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;
        }
        .instr-box { background: white; color: #333; padding: 30px; border-radius: 40px; border: 10px solid #8854d0; max-width: 850px; font-size: 2rem; line-height: 1.5; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .instr-box h2 { color: #8854d0; margin-top: 0; font-size: 3rem; text-transform: uppercase; }
        .instr-page { display: none; }
        .instr-page.active-page { display: block; }
        .instr-nav { margin-top: 35px; display: flex; gap: 20px; justify-content: center; }
        .btn-nav { padding: 15px 40px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; font-size: 1.4rem; font-family: 'Fredoka', sans-serif; transition: transform 0.1s; }
        .btn-nav:active { transform: translateY(4px); }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <button class="btn-modern btn-instruction-home" onclick="toggleInstructions()">INSTRUCTION</button>
        <button class="btn-modern btn-start" onclick="showFlashcards()">START</button>
    </div>

    <div id="flashcard-page" class="page">
        <button class="btn-modern btn-home" onclick="goHome()">HOME</button>

        <div class="card-container" onclick="flipCard()">
            <div id="card-inner" class="card-inner">
                <div class="card-face card-front"><img id="img-front" src="" alt="Front"></div>
                <div class="card-face card-back"><img id="img-back" src="" alt="Back"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-modern btn-shuffle" onclick="shuffleCard()">SHUFFLE</button>
        </div>
    </div>

    <div id="instruction-overlay">
        <div class="instr-box">
            <div id="instr-p1" class="instr-page active-page">
                <h2>Page 1</h2>
                <p>Look at the card.</p>
                <p>👉 If you see a <b>word</b>, touch the body part.</p>
                <p>👉 If you see a <b>picture</b>, say the word.</p>
            </div>
            <div id="instr-p2" class="instr-page">
                <h2>Page 2</h2>
                <p>Listen and Answer:</p>
                <p>👉 “What’s wrong?” → “My ___ hurts.”</p>
                <p>👉 “Do you have a ___?” → “Yes, I do.” / “No, I don’t. I have a _____.”</p>
            </div>
            <div class="instr-nav">
                <button id="nav-btn" class="btn-nav" style="background: #8854d0; color: white;" onclick="nextInstr()">Next Page</button>
                <button class="btn-nav" style="background: #ff4757; color: white;" onclick="toggleInstructions()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const randomizable = [
            {a: 'A_arms.png', b: 'B_arms.png'}, {a: 'A_ears.png', b: 'B_ears.png'},
            {a: 'A_eyes.png', b: 'B_eyes.png'}, {a: 'A_feet.png', b: 'B_feet.png'},
            {a: 'A_foot.png', b: 'B_foot.png'}, {a: 'A_hands.png', b: 'B_hands.png'},
            {a: 'A_head.png', b: 'B_head.png'}, {a: 'A_knees.png', b: 'B_knees.png'},
            {a: 'A_legs.png', b: 'B_legs.png'}, {a: 'A_mouth.png', b: 'B_mouth.png'},
            {a: 'A_nose.png', b: 'B_nose.png'}
        ];

        const fixed = [
            {a: 'A_cold.png', b: 'B_cold.png'}, {a: 'A_fever.png', b: 'B_fever.png'},
            {a: 'A_headache.png', b: 'B_headache.png'}, {a: 'A_runny_nose.png', b: 'B_runny_nose.png'},
            {a: 'A_sore_throat.png', b: 'B_sore_throat.png'}, {a: 'A_stomachache.png', b: 'B_stomachache.png'},
            {a: 'A_toothache.png', b: 'B_toothache.png'}
        ];

        let availableIndices = [];
        let instrPage = 1;
        const cardInner = document.getElementById('card-inner');
        const imgFront = document.getElementById('img-front');
        const imgBack = document.getElementById('img-back');

        function showFlashcards() {
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('flashcard-page').classList.add('active');
            shuffleCard();
        }

        function goHome() {
            document.getElementById('flashcard-page').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
        }

        function flipCard() { cardInner.classList.toggle('flipped'); }

        function toggleInstructions() {
            const overlay = document.getElementById('instruction-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
            instrPage = 1;
            updateInstrUI();
        }

        function nextInstr() {
            instrPage = (instrPage === 1) ? 2 : 1;
            updateInstrUI();
        }

        function updateInstrUI() {
            document.getElementById('instr-p1').classList.toggle('active-page', instrPage === 1);
            document.getElementById('instr-p2').classList.toggle('active-page', instrPage === 2);
            document.getElementById('nav-btn').innerText = (instrPage === 1) ? "Next Page" : "Previous Page";
        }

        function shuffleCard() {
            cardInner.style.transition = 'none';
            cardInner.classList.remove('flipped');
            
            const totalPairs = randomizable.length + fixed.length;
            if (availableIndices.length === 0) {
                availableIndices = [...Array(totalPairs).keys()];
            }

            const randomIndex = Math.floor(Math.random() * availableIndices.length);
            const pairIndex = availableIndices.splice(randomIndex, 1)[0];
            
            let finalFront, finalBack;

            if (pairIndex < randomizable.length) {
                const pair = randomizable[pairIndex];
                const coinFlip = Math.random() < 0.5;
                finalFront = coinFlip ? pair.a : pair.b;
                finalBack = coinFlip ? pair.b : pair.a;
            } else {
                const pair = fixed[pairIndex - randomizable.length];
                finalFront = pair.a;
                finalBack = pair.b;
            }

            imgFront.src = finalFront;
            imgBack.src = finalBack;

            setTimeout(() => {
                cardInner.style.transition = 'transform 0.75s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 50);
        }

        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
