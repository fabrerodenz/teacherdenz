<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Figure it Out!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5722;
            --secondary: #4CAF50;
            --accent: #2196F3;
            --bg: #e0e5ec;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Fredoka', sans-serif; overflow: hidden;
            background-color: var(--bg);
        }

        .page {
            display: none; width: 100vw; height: 100vh;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            position: absolute; top: 0; left: 0;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .active { display: flex; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #home-page { background-image: url('home_page.png'); }
        #game-page { background-image: url('game_page.png'); }
        #question-page { background-image: url('question_page.png'); }
        #answer-page { background-image: url('answer_page.png'); }
        #result-page { background-image: url('final_result.png'); }

        /* 3D NEUMORPHIC GLOSSY STYLE (NO OUTER SHADOW) */
        .btn {
            padding: 22px 45px; font-size: 2.2rem; font-weight: 600;
            color: white; border: none; cursor: pointer; margin: 15px;
            border-radius: 40px; /* 30-50px radius */
            position: relative; overflow: hidden;
            background: var(--primary);
            /* Inset shadows create 3D depth without external shadow */
            box-shadow: inset 6px 6px 12px rgba(255,255,255,0.4), 
                        inset -6px -6px 12px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* Bounce release */
        }

        /* Glossy Highlight Overlay */
        .btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .btn:active {
            transform: scale(0.88); /* Squishy effect */
            filter: brightness(0.9);
        }

        .btn-green { background-color: var(--secondary); }
        .btn-blue { background-color: var(--accent); }

        /* INSTRUCTION BOX - CENTERED & LARGE */
        .instruction-box {
            background: rgba(255, 255, 255, 0.9); padding: 50px 70px; border-radius: 40px;
            text-align: center; font-size: 2.5rem; line-height: 2.2; max-width: 85%;
            box-shadow: inset 4px 4px 10px rgba(0,0,0,0.05);
        }

        /* SCOREBOARD */
        .scoreboard-container {
            position: absolute; top: 10%;
            display: flex; gap: 50px; background: #f0f3f7;
            padding: 25px 50px; border-radius: 50px;
            box-shadow: inset 8px 8px 16px rgba(0,0,0,0.1), inset -8px -8px 16px rgba(255,255,255,0.8);
        }

        .score-box { text-align: center; min-width: 170px; }
        .score-num { font-size: 5rem; font-weight: bold; color: var(--primary); }

        /* NUMBER ICONS */
        .number-container { display: flex; gap: 30px; margin-top: 80px; }
        .num-box {
            width: 160px; height: 160px; border-radius: 40px;
            font-size: 5rem; font-weight: bold; color: white;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent); position: relative; overflow: hidden;
            box-shadow: inset 6px 6px 12px rgba(255,255,255,0.4), inset -6px -6px 12px rgba(0,0,0,0.2);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .num-box:active { transform: scale(0.85); }
        .num-box.used { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

        /* LOWERED NAVIGATION */
        .game-nav { position: absolute; bottom: 15px; display: flex; gap: 30px; } 

        #music-btn {
            position: fixed; top: 20px; right: 20px; background: white;
            border-radius: 50%; width: 70px; height: 70px; font-size: 2rem; 
            cursor: pointer; z-index: 1000; border: none;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }

        .display-img { max-height: 42vh; border: 12px solid white; border-radius: 30px; }
        .answer-text { font-size: 3.5rem; background: white; padding: 25px 45px; border-radius: 30px; margin-top: 40px; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="bgMusic" loop preload="auto">
        <source src="game_bg.mp3" type="audio/mpeg">
    </audio>

    <button id="music-btn" onclick="toggleMusic(event)">🎵</button>

    <div id="home-page" class="page active">
        <div class="game-nav" style="bottom: 40px;">
            <button class="btn btn-blue" onclick="showPage('how-to-page')">How to Play</button>
            <button class="btn btn-green" onclick="showPage('game-page')">Start Game</button>
            <button class="btn btn-blue" onclick="showPage('groups-page')">Groups</button>
        </div>
    </div>

    <div id="how-to-page" class="page">
        <div class="instruction-box">
            <b>Go to the front.</b><br>
            <b>Look at the picture.</b><br>
            <b>Write the correct sentence on your whiteboard.</b><br>
            <b>Press the buzzer when you finish.</b><br>
            <b>Read the sentence with your group.</b>
        </div>
        <button class="btn btn-blue" style="margin-top: 40px;" onclick="showPage('home-page')">Back</button>
    </div>

    <div id="game-page" class="page">
        <div class="scoreboard-container">
            <div class="score-box">
                <div style="font-size: 1.5rem; font-weight: 600;">Group A</div>
                <div id="scoreA" class="score-num">0</div>
                <button class="btn btn-green" style="padding: 8px 20px; font-size: 1.2rem;" onclick="changeScore('A', 1)">➕</button>
                <button class="btn" style="padding: 8px 20px; font-size: 1.2rem;" onclick="changeScore('A', -1)">➖</button>
            </div>
            <div class="score-box">
                <div style="font-size: 1.5rem; font-weight: 600;">Group B</div>
                <div id="scoreB" class="score-num">0</div>
                <button class="btn btn-green" style="padding: 8px 20px; font-size: 1.2rem;" onclick="changeScore('B', 1)">➕</button>
                <button class="btn" style="padding: 8px 20px; font-size: 1.2rem;" onclick="changeScore('B', -1)">➖</button>
            </div>
        </div>

        <div class="number-container">
            <div class="num-box" id="box1" style="background:#f44336" onclick="startQ(0)">1</div>
            <div class="num-box" id="box2" style="background:#2196F3" onclick="startQ(1)">2</div>
            <div class="num-box" id="box3" style="background:#4CAF50" onclick="startQ(2)">3</div>
            <div class="num-box" id="box4" style="background:#FF9800" onclick="startQ(3)">4</div>
            <div class="num-box" id="box5" style="background:#9C27B0" onclick="startQ(4)">5</div>
        </div>

        <div class="game-nav">
            <button class="btn btn-blue" onclick="showPage('home-page')">Back to Home</button>
            <button class="btn btn-green" onclick="showResults()">Final Results</button>
        </div>
    </div>

    <div id="question-page" class="page">
        <div id="q-prompt" style="font-size: 3rem; background: white; padding: 20px 40px; border-radius: 30px; margin-bottom: 25px;"></div>
        <img id="q-img" src="" class="display-img">
        <button class="btn btn-green" style="margin-top: 30px;" onclick="showAns()">SHOW THE ANSWER</button>
    </div>

    <div id="answer-page" class="page">
        <img id="a-img" src="" class="display-img">
        <div id="a-text" class="answer-text" style="color:var(--secondary); font-weight:bold;"></div>
        <div style="display:flex; gap:30px; margin-top: 20px;">
            <button class="btn btn-blue" onclick="award('A')">Group A</button>
            <button class="btn btn-blue" onclick="award('B')">Group B</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Do you have a sore throat?", a: "No, I don’t. I have a runny nose.", img: "Q1.png" },
            { q: "Do you have a toothache?", a: "Yes, I do.", img: "Q2.png" },
            { q: "Do you have a fever?", a: "Yes, I do.", img: "Q3.png" },
            { q: "Do you have a stomachache?", a: "No, I don’t. I have a cold.", img: "Q4.png" },
            { q: "Do you have a headache?", a: "Yes, I do.", img: "Q5.png" }
        ];

        let scores = { A: 0, B: 0 };
        let currentIdx = 0;
        let music = document.getElementById('bgMusic');
        let audioInitialized = false;

        function initAudio() {
            if (!audioInitialized) {
                music.play().catch(e => console.log("Audio waiting for interaction"));
                audioInitialized = true;
            }
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                document.getElementById('music-btn').innerText = '🎵';
            } else {
                music.pause();
                document.getElementById('music-btn').innerText = '🔇';
            }
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQ(i) {
            currentIdx = i;
            document.getElementById('q-prompt').innerText = questions[i].q;
            document.getElementById('q-img').src = questions[i].img;
            document.getElementById(`box${i+1}`).classList.add('used');
            showPage('question-page');
        }

        function showAns() {
            document.getElementById('a-img').src = questions[currentIdx].img;
            document.getElementById('a-text').innerText = questions[currentIdx].a;
            showPage('answer-page');
        }

        function award(winner) {
            if(winner === 'A') { scores.A += 2; scores.B += 1; }
            else { scores.B += 2; scores.A += 1; }
            document.getElementById('scoreA').innerText = scores.A;
            document.getElementById('scoreB').innerText = scores.B;
            showPage('game-page');
        }

        function changeScore(g, v) {
            scores[g] = Math.max(0, scores[g] + v);
            document.getElementById('scoreA').innerText = scores.A;
            document.getElementById('scoreB').innerText = scores.B;
        }

        function showResults() {
            // Logic to show results page
            alert(`Final Scores\nGroup A: ${scores.A}\nGroup B: ${scores.B}`);
        }
    </script>
</body>
</html>
